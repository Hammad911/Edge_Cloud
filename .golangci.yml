version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - ineffassign
    - unused
    - errcheck
    - revive
    - gocyclo
    - misspell
    - unconvert

  settings:
    gocyclo:
      min-complexity: 15
    revive:
      severity: warning

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocyclo

formatters:
  enable:
    - gofmt
    - goimports
