node:
  id: edge-b-0
  role: edge
  region: us-west-2

admin:
  listen_addr: 127.0.0.1:8021
  enable_pprof: false

grpc:
  listen_addr: 127.0.0.1:7021
  reflection: true

raft:
  enabled: false

replication:
  enabled: true
  group_id: edge-b
  outbox_capacity: 10000
  buffer_dir: ./data/edge-b-0/buffer
  peers:
    - name: cloud
      addr: 127.0.0.1:9001

logging:
  level: info
  format: text
