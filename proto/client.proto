syntax = "proto3";

package edgecloud.v1;

option go_package = "edge-cloud-replication/gen/edgecloud/v1;edgecloudv1";

// Client-facing key/value API (placeholder).
service KV {
  rpc Get(GetRequest) returns (GetResponse);
  rpc Put(PutRequest) returns (PutResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

message GetRequest {
  string key = 1;
  bytes session = 2; // dependency metadata (future)
}

message GetResponse {
  bytes value = 1;
  bool found = 2;
  bytes session = 3; // updated dependency metadata (future)
}

message PutRequest {
  string key = 1;
  bytes value = 2;
  bytes session = 3; // dependency metadata (future)
}

message PutResponse {
  bytes session = 1;
}

message DeleteRequest {
  string key = 1;
  bytes session = 2;
}

message DeleteResponse {
  bytes session = 1;
}

